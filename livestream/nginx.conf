worker_processes auto;
rtmp_auto_push on;

events {
    worker_connections 1024;
}

# RTMP ingest — OBS sends streams here
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        notify_method get;

        # Main live application — OBS connects to rtmp://<ip>:1935/live/<stream_key>
        application live {
            live on;
            record off;

            # Allow publishing from Tailscale network only (100.64.0.0/10)
            allow publish 100.0.0.0/8;
            deny publish all;

            # Allow playback from Tailscale network
            allow play 100.0.0.0/8;
            deny play all;

            # Notify dashboard of stream events
            on_publish http://127.0.0.1:8080/api/hooks/on_publish;
            on_publish_done http://127.0.0.1:8080/api/hooks/on_publish_done;

            # HLS output for preview in dashboard
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3;
            hls_playlist_length 10;
        }

        # Composite output — internal, FFmpeg writes the mixed stream here
        application composite {
            live on;
            record off;
            allow publish 127.0.0.1;
            deny publish all;
            allow play 127.0.0.1;
            allow play 100.0.0.0/8;
            deny play all;

            hls on;
            hls_path /tmp/hls-composite;
            hls_fragment 3;
            hls_playlist_length 10;
        }
    }
}

# HTTP server for HLS playback and stats
http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8088;

        # HLS streams for preview
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /hls-composite {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # RTMP stats in XML (used by dashboard)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            add_header Access-Control-Allow-Origin *;
        }

        location /stat.xsl {
            root /usr/local/nginx/html;
        }
    }
}
