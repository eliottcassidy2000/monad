name: toolchain-images

# Build + publish the containerized toolchains to GHCR. The operator/bootstrap host has no
# Docker, so CI is the builder. Runs on changes to the image definitions.
on:
  push:
    branches: [main]
    paths:
      - "meta/images/**"
      - ".github/workflows/images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lean-toolchain
            context: meta/images/lean-toolchain
          - name: compute
            context: meta/images/compute
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/claude-monad/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
